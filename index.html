<script>
'use strict';

/* ═══════════════════════════════════
   STATE
═══════════════════════════════════ */
let results = [];
let filteredResults = [];
let activeTab = 'overview';
let selectedRow = null;
let crawling = false;
let stopFlag = false;
let sortKey = null;
let sortAsc = true;

/* ═══════════════════════════════════
   TABS
═══════════════════════════════════ */
const TABS = [
  {id:'overview',  label:'Overview'},
  {id:'titles',    label:'Page Titles'},
  {id:'meta',      label:'Meta Desc'},
  {id:'h1',        label:'H1 / Headings'},
  {id:'response',  label:'Response Codes'},
  {id:'images',    label:'Images'},
  {id:'links',     label:'Internal Links'},
  {id:'canonical', label:'Canonicals'},
  {id:'directives',label:'Directives'},
  {id:'schema',    label:'Schema / OG'},
  {id:'security',  label:'Security'},
  {id:'issues',    label:'All Issues'},
];

/* ═══════════════════════════════════
   CORS PROXIES — 6 fallbacks
═══════════════════════════════════ */
const PROXIES = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  u => `https://thingproxy.freeboard.io/fetch/${u}`,
  u => `https://proxy.cors.sh/${u}`,
  u => `https://cors-anywhere.herokuapp.com/${u}`,
];

// Track which proxy works best
let bestProxy = 0;

async function fetchPage(url, timeout = 15000) {
  // Try best proxy first, then others
  const order = [bestProxy, ...PROXIES.map((_,i)=>i).filter(i=>i!==bestProxy)];
  for (const pi of order) {
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), timeout);
      const t0 = Date.now();
      const res = await fetch(PROXIES[pi](url), {
        signal: ctrl.signal,
        headers: { 'X-Requested-With': 'XMLHttpRequest' }
      });
      clearTimeout(tid);
      const ms = Date.now() - t0;
      if (res.ok) {
        const text = await res.text();
        if (text && text.length > 100) {
          bestProxy = pi; // remember what worked
          return { ok: true, status: 200, text, ms };
        }
      }
    } catch (e) { /* try next */ }
  }
  return { ok: false, status: 0, text: '', ms: timeout };
}

/* ═══════════════════════════════════
   SITEMAP FETCHER — KEY FIX FOR JS SITES
═══════════════════════════════════ */
async function fetchSitemap(baseUrl) {
  const urls = new Set();
  const origin = getOrigin(baseUrl);
  if (!origin) return urls;

  // Common sitemap locations
  const sitemapUrls = [
    `${origin}/sitemap.xml`,
    `${origin}/sitemap_index.xml`,
    `${origin}/sitemap-index.xml`,
    `${origin}/sitemaps.xml`,
    `${origin}/sitemap/sitemap.xml`,
    `${origin}/robots.txt`, // robots.txt may contain sitemap URL
  ];

  setProgress(0, 0, 100, '🗺️ Fetching sitemap.xml…');

  for (const sUrl of sitemapUrls) {
    try {
      const { ok, text } = await fetchPage(sUrl, 10000);
      if (!ok || !text) continue;

      // Parse robots.txt for Sitemap: directives
      if (sUrl.endsWith('robots.txt')) {
        const sitemapMatches = text.match(/^Sitemap:\s*(.+)$/gim) || [];
        for (const m of sitemapMatches) {
          const sitemapRef = m.replace(/^Sitemap:\s*/i, '').trim();
          const refUrls = await parseSitemapXml(sitemapRef, origin);
          refUrls.forEach(u => urls.add(u));
        }
        continue;
      }

      // Parse XML sitemap
      const parsed = await parseSitemapXml(sUrl, origin, text);
      parsed.forEach(u => urls.add(u));

      if (urls.size > 0) {
        setProgress(0, urls.size, 100, `🗺️ Found ${urls.size} URLs in sitemap`);
        break; // Got URLs, stop trying other sitemaps
      }
    } catch (e) { /* continue */ }
  }

  return urls;
}

async function parseSitemapXml(sUrl, origin, existingText = null) {
  const urls = new Set();
  try {
    const text = existingText || (await fetchPage(sUrl, 10000)).text;
    if (!text) return urls;

    const parser = new DOMParser();
    const xml = parser.parseFromString(text, 'text/xml');

    // Sitemap index — recurse into sub-sitemaps
    const sitemapLocs = [...xml.querySelectorAll('sitemap > loc')];
    if (sitemapLocs.length > 0) {
      for (const loc of sitemapLocs.slice(0, 10)) { // max 10 sub-sitemaps
        const subUrls = await parseSitemapXml(loc.textContent.trim(), origin);
        subUrls.forEach(u => urls.add(u));
        if (urls.size > 5000) break;
      }
      return urls;
    }

    // Regular sitemap
    xml.querySelectorAll('url > loc').forEach(loc => {
      const u = loc.textContent.trim();
      if (u && u.startsWith(origin)) urls.add(u);
    });

    // Fallback: regex extract if XML parse fails
    if (urls.size === 0) {
      const matches = text.match(/<loc>\s*(https?:\/\/[^<\s]+)\s*<\/loc>/gi) || [];
      matches.forEach(m => {
        const u = m.replace(/<\/?loc>/gi, '').trim();
        if (u.startsWith(origin)) urls.add(u);
      });
    }
  } catch (e) { /* ignore */ }
  return urls;
}

/* ═══════════════════════════════════
   HTML PARSER → SEO DATA
═══════════════════════════════════ */
const skipExt = /\.(jpg|jpeg|png|gif|svg|webp|pdf|zip|mp4|mp3|css|js|ico|woff|woff2|ttf|eot|xml|txt|doc|docx|xls|xlsx|json)(\?.*)?$/i;

function getOrigin(url) {
  try { return new URL(url).origin; } catch { return ''; }
}

function normalizeUrl(href, base, origin) {
  if (!href || href.startsWith('#') || href.startsWith('mailto:') ||
      href.startsWith('tel:') || href.startsWith('javascript:') ||
      href.startsWith('data:')) return null;
  try {
    const u = new URL(href, base);
    u.hash = '';
    if (!u.href.startsWith(origin)) return null;
    if (skipExt.test(u.pathname)) return null;
    return u.href;
  } catch { return null; }
}

function extractLinksFromJS(html, origin) {
  // Extract URLs hidden in JavaScript / JSON (for Next.js, React, etc.)
  const found = new Set();
  // Match href patterns in JS
  const patterns = [
    /["']href["']\s*:\s*["']([^"']+)["']/g,
    /href=["']([^"'#\s][^"']*?)["']/g,
    /["'](\/[a-zA-Z0-9\-_/]+(?:\?[^"'\s]*)?)["']/g, // relative paths
    new RegExp(`["'](${origin.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}/[^"'\\s]+)["']`, 'g'),
  ];
  for (const pat of patterns) {
    let m;
    const re = new RegExp(pat.source, pat.flags);
    while ((m = re.exec(html)) !== null) {
      const raw = m[1];
      const norm = normalizeUrl(raw, origin, origin);
      if (norm) found.add(norm);
      if (found.size > 500) break;
    }
  }
  return found;
}

function parsePage(url, html, status, ms) {
  const dp = new DOMParser();
  const doc = dp.parseFromString(html, 'text/html');
  const g = s => doc.querySelector(s);
  const ga = s => [...doc.querySelectorAll(s)];
  const origin = getOrigin(url);

  const title = (g('title')?.textContent || '').trim();
  const metaDesc = (g('meta[name="description"]')?.getAttribute('content') || '').trim();
  const canonical = (g('link[rel="canonical"]')?.getAttribute('href') || '').trim();
  const robotsMeta = (g('meta[name="robots"]')?.getAttribute('content') || '').trim();
  const lang = doc.documentElement?.getAttribute('lang') || '';
  const charset = g('meta[charset]')?.getAttribute('charset') || '';
  const viewport = !!g('meta[name="viewport"]');
  const ogTitle = (g('meta[property="og:title"]')?.getAttribute('content') || '').trim();
  const ogImage = (g('meta[property="og:image"]')?.getAttribute('content') || '').trim();
  const twitterCard = (g('meta[name="twitter:card"]')?.getAttribute('content') || '').trim();

  const h1s = ga('h1').map(e => e.textContent.trim()).filter(Boolean);
  const h2c = ga('h2').length;
  const h3c = ga('h3').length;

  const imgs = ga('img');
  const missingAlt = imgs.filter(i => !(i.getAttribute('alt') || '').trim()).length;
  const largeImgs = imgs.filter(i => parseInt(i.getAttribute('width') || '0') > 2000).length;

  const bodyTxt = (doc.body?.textContent || '').replace(/\s+/g, ' ').trim();
  const wordCount = bodyTxt.split(/\s+/).filter(Boolean).length;
  const noindex = /noindex/i.test(robotsMeta);
  const nofollow = /nofollow/i.test(robotsMeta);
  const pageSizeKb = Math.round(html.length / 1024);

  // ── Link extraction (HTML + JS) ──
  const discovered = new Set();
  let intLinks = 0, extLinks = 0;

  // 1. Standard anchor tags
  ga('a[href]').forEach(a => {
    const raw = a.getAttribute('href') || '';
    const norm = normalizeUrl(raw, url, origin);
    if (norm) { intLinks++; discovered.add(norm); }
    else if (raw.startsWith('http')) extLinks++;
  });

  // 2. Extract from JS/JSON in page (handles Next.js, React router, etc.)
  const jsUrls = extractLinksFromJS(html, origin);
  jsUrls.forEach(u => { discovered.add(u); });

  // 3. Next.js __NEXT_DATA__ specific
  try {
    const nextData = g('script#__NEXT_DATA__')?.textContent;
    if (nextData) {
      const nd = JSON.parse(nextData);
      extractUrlsFromObj(nd, origin, discovered);
    }
  } catch {}

  // 4. Meta refresh / redirect
  const refresh = g('meta[http-equiv="refresh"]')?.getAttribute('content') || '';
  const rMatch = refresh.match(/url=(.+)/i);
  if (rMatch) {
    const norm = normalizeUrl(rMatch[1], url, origin);
    if (norm) discovered.add(norm);
  }

  // Schema
  const schemaScripts = ga('script[type="application/ld+json"]');
  const schemaTypes = schemaScripts.flatMap(s => {
    try { const d = JSON.parse(s.textContent); return [d['@type']].flat().filter(Boolean); } catch { return []; }
  });
  const hreflangCount = ga('link[rel="alternate"][hreflang]').length;

  // ── Issues ──
  const issues = [];
  const tl = title.length, dl = metaDesc.length;
  if (!title)         issues.push({ t: 'error',   cat: 'Title',       msg: 'Missing page title' });
  else if (tl > 70)   issues.push({ t: 'warning',  cat: 'Title',       msg: `Title too long (${tl} chars, max 70)` });
  else if (tl < 30)   issues.push({ t: 'warning',  cat: 'Title',       msg: `Title too short (${tl} chars)` });
  if (!metaDesc)      issues.push({ t: 'warning',  cat: 'Meta',        msg: 'Missing meta description' });
  else if (dl > 165)  issues.push({ t: 'warning',  cat: 'Meta',        msg: `Meta desc too long (${dl} chars)` });
  else if (dl < 70)   issues.push({ t: 'warning',  cat: 'Meta',        msg: `Meta desc too short (${dl} chars)` });
  if (!h1s.length)    issues.push({ t: 'error',    cat: 'H1',          msg: 'Missing H1 heading' });
  if (h1s.length > 1) issues.push({ t: 'warning',  cat: 'H1',          msg: `Multiple H1 tags (${h1s.length})` });
  if (!canonical)     issues.push({ t: 'warning',  cat: 'Canonical',   msg: 'No canonical tag found' });
  if (missingAlt > 0) issues.push({ t: 'warning',  cat: 'Images',      msg: `${missingAlt} image(s) missing alt text` });
  if (noindex)        issues.push({ t: 'error',    cat: 'Directives',  msg: 'Page is noindex — excluded from search' });
  if (!url.startsWith('https://')) issues.push({ t: 'warning', cat: 'Security', msg: 'Not served over HTTPS' });
  if (wordCount < 100) issues.push({ t: 'warning', cat: 'Content',     msg: `Low word count (${wordCount} words)` });
  if (!ogTitle && !ogImage) issues.push({ t: 'info', cat: 'Social',   msg: 'No Open Graph tags found' });
  if (!schemaTypes.length)  issues.push({ t: 'info', cat: 'Schema',   msg: 'No structured data (JSON-LD)' });
  if (status >= 400)  issues.push({ t: 'error',    cat: 'Status',      msg: `HTTP ${status} error` });
  if (h2c === 0 && wordCount > 300) issues.push({ t: 'info', cat: 'Structure', msg: 'No H2 subheadings found' });
  if (pageSizeKb > 500) issues.push({ t: 'warning', cat: 'Performance', msg: `Large page size (${pageSizeKb} KB)` });
  if (largeImgs > 0)  issues.push({ t: 'warning',  cat: 'Images',      msg: `${largeImgs} oversized image(s)` });

  return {
    url, status_code: status, ms,
    title, tl,
    metaDesc, dl,
    h1: h1s[0] || '', h1c: h1s.length, h2c, h3c,
    wordCount,
    canonical, hasCanonical: !!canonical,
    robotsMeta: robotsMeta || 'index, follow',
    noindex, nofollow, lang, charset, viewport,
    imgCount: imgs.length, missingAlt, largeImgs,
    intLinks, extLinks,
    isHttps: url.startsWith('https://'),
    hasSchema: schemaTypes.length > 0, schemaTypes,
    hasOG: !!(ogTitle || ogImage), ogTitle, ogImage, twitterCard,
    hreflangCount, pageSizeKb,
    issues,
    _discovered: [...discovered],
  };
}

function extractUrlsFromObj(obj, origin, found, depth = 0) {
  if (depth > 8 || !obj) return;
  if (typeof obj === 'string') {
    if (obj.startsWith('/') && obj.length > 1 && !skipExt.test(obj)) {
      const norm = normalizeUrl(obj, origin, origin);
      if (norm) found.add(norm);
    }
    return;
  }
  if (Array.isArray(obj)) {
    obj.slice(0, 50).forEach(v => extractUrlsFromObj(v, origin, found, depth + 1));
    return;
  }
  if (typeof obj === 'object') {
    Object.values(obj).slice(0, 50).forEach(v => extractUrlsFromObj(v, origin, found, depth + 1));
  }
}

/* ═══════════════════════════════════
   CRAWLER ENGINE — FIXED
═══════════════════════════════════ */
async function crawlSite(startUrl, maxPages, concurrency) {
  const visited = new Set();
  const queue = [];
  let crawled = 0;
  let activeWorkers = 0;
  const origin = getOrigin(startUrl);

  // ── STEP 1: Try sitemap first (solves JS-rendered sites) ──
  const sitemapUrls = await fetchSitemap(startUrl);
  if (sitemapUrls.size > 0) {
    setProgress(0, sitemapUrls.size, maxPages, `🗺️ ${sitemapUrls.size} URLs from sitemap — starting crawl…`);
    // Add sitemap URLs to queue (respect maxPages limit)
    const sitemapArr = [...sitemapUrls].slice(0, maxPages * 2);
    // Always crawl startUrl first
    queue.push(startUrl);
    sitemapArr.forEach(u => { if (u !== startUrl) queue.push(u); });
  } else {
    queue.push(startUrl);
    setProgress(0, 1, maxPages, '🌐 No sitemap found — crawling via link discovery…');
  }

  // ── STEP 2: BFS Crawler ──
  async function worker() {
    activeWorkers++;
    while (!stopFlag) {
      // Exit conditions
      if (crawled >= maxPages) break;

      // Wait briefly if queue empty but other workers might still be adding URLs
      if (queue.length === 0) {
        if (activeWorkers <= 1) break; // last worker, no more URLs coming
        await sleep(300);
        continue;
      }

      const url = queue.shift();
      if (!url || visited.has(url)) continue;
      visited.add(url);

      document.getElementById('sb-queue').textContent = queue.length;
      setProgress(crawled, queue.length, maxPages,
        `🕷️ [${crawled}/${maxPages}] ${url.length > 65 ? url.slice(0, 65) + '…' : url}`);

      const { ok, status, text, ms } = await fetchPage(url);
      crawled++;

      let page;
      if (ok && text && text.length > 50) {
        try {
          page = parsePage(url, text, status || 200, ms);
          // Add newly discovered URLs to queue
          page._discovered.forEach(u => {
            if (!visited.has(u) && !queue.includes(u) && (crawled + queue.length) < maxPages * 3) {
              queue.push(u);
            }
          });
        } catch (e) {
          page = errorPage(url, status, ms, `Parse error: ${e.message}`);
        }
      } else {
        page = errorPage(url, status || 0, ms, status === 0 ? 'All proxies failed / timeout' : `HTTP ${status}`);
      }

      results.push(page);
      applyFilter();
      updateStatusBar();
      if (results.length % 5 === 0 || results.length <= 5) renderTab();
    }
    activeWorkers--;
  }

  const workers = Array.from({ length: concurrency }, () => worker());
  await Promise.all(workers);
}

function errorPage(url, status, ms, errMsg) {
  return {
    url, status_code: status, ms,
    title: '', tl: 0, metaDesc: '', dl: 0,
    h1: '', h1c: 0, h2c: 0, h3c: 0, wordCount: 0,
    canonical: '', hasCanonical: false,
    robotsMeta: '', noindex: false, nofollow: false,
    lang: '', charset: '', viewport: false,
    imgCount: 0, missingAlt: 0, largeImgs: 0,
    intLinks: 0, extLinks: 0,
    isHttps: url.startsWith('https://'),
    hasSchema: false, schemaTypes: [],
    hasOG: false, ogTitle: '', ogImage: '', twitterCard: '',
    hreflangCount: 0, pageSizeKb: 0,
    issues: [{ t: 'error', cat: 'Fetch', msg: errMsg }],
    _discovered: [],
  };
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

/* ═══════════════════════════════════
   CRAWL CONTROL
═══════════════════════════════════ */
async function toggleCrawl() {
  if (crawling) { stopCrawl(); return; }

  let url = document.getElementById('url-input').value.trim();
  if (!url) { alert('Please enter a URL to crawl.'); return; }
  if (!url.startsWith('http')) url = 'https://' + url;
  try { new URL(url); } catch { alert('Invalid URL. Please include https://'); return; }

  results = []; filteredResults = []; selectedRow = null;
  stopFlag = false; crawling = true;
  sortKey = null; sortAsc = true;
  closeDetail();

  const maxPages = parseInt(document.getElementById('max-pages-sel').value);
  const concurrency = parseInt(document.getElementById('concurrency-sel').value);

  document.getElementById('btn-start').innerHTML = '<span class="spinning">⏹</span> Stop';
  document.getElementById('btn-start').classList.add('stopping');
  document.getElementById('progressbar').classList.add('visible');
  document.getElementById('btn-export').style.display = 'none';
  document.getElementById('filter-input').style.display = 'none';
  document.getElementById('filter-status').style.display = 'none';
  document.getElementById('filter-input').value = '';
  document.getElementById('filter-status').value = 'all';
  document.getElementById('sb-queue').textContent = '0';

  setProgress(0, 0, maxPages, '🚀 Starting crawl engine…');
  updateStatusBar();
  renderTab();

  await crawlSite(url, maxPages, concurrency);

  crawling = false; stopFlag = false;
  document.getElementById('btn-start').innerHTML = '▶ Start Crawl';
  document.getElementById('btn-start').classList.remove('stopping');
  document.getElementById('btn-export').style.display = results.length ? '' : 'none';
  document.getElementById('filter-input').style.display = results.length ? '' : 'none';
  document.getElementById('filter-status').style.display = results.length ? '' : 'none';
  setProgress(100, 0, 100, `✅ Done — ${results.length} URLs crawled`);
  renderTab();
}

function stopCrawl() { stopFlag = true; crawling = false; }

/* ═══════════════════════════════════
   PROGRESS

function setProgress(done, queued, total, msg) {
  const pct = total > 0 ? Math.min(100, Math.round(done / total * 100)) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = msg || '';
}

/* ═══════════════════════════════════
   STATUS BAR
═══════════════════════════════════ */
function updateStatusBar() {
  const R = results;
  document.getElementById('sb-urls').textContent = R.length;
  document.getElementById('sb-ok').textContent = R.filter(r => r.status_code >= 200 && r.status_code < 300).length;
  document.getElementById('sb-err').textContent = R.reduce((a, r) => a + r.issues.filter(i => i.t === 'error').length, 0);
  document.getElementById('sb-warn').textContent = R.reduce((a, r) => a + r.issues.filter(i => i.t === 'warning').length, 0);
  document.getElementById('sb-notitle').textContent = R.filter(r => !r.title).length;
  document.getElementById('sb-noh1').textContent = R.filter(r => r.h1c === 0).length;
  document.getElementById('sb-alt').textContent = R.reduce((a, r) => a + (r.missingAlt || 0), 0);
}

/* ═══════════════════════════════════
   FILTER + SORT
═══════════════════════════════════ */
function applyFilter() {
  const q = (document.getElementById('filter-input').value || '').toLowerCase();
  const fs = document.getElementById('filter-status').value;
  let rows = [...results];
  if (q) rows = rows.filter(r => r.url.toLowerCase().includes(q) || (r.title || '').toLowerCase().includes(q));
  if (fs === 'errors')   rows = rows.filter(r => r.issues.some(i => i.t === 'error'));
  else if (fs === 'warnings') rows = rows.filter(r => r.issues.some(i => i.t === 'warning'));
  else if (fs === 'ok')  rows = rows.filter(r => !r.issues.some(i => i.t === 'error' || i.t === 'warning'));
  else if (fs === '2xx') rows = rows.filter(r => r.status_code >= 200 && r.status_code < 300);
  else if (fs === '3xx') rows = rows.filter(r => r.status_code >= 300 && r.status_code < 400);
  else if (fs === '4xx') rows = rows.filter(r => r.status_code >= 400 && r.status_code < 500);
  if (sortKey) rows.sort((a, b) => {
    const av = a[sortKey] ?? '', bv = b[sortKey] ?? '';
    return sortAsc ? (av > bv ? 1 : av < bv ? -1 : 0) : (av < bv ? 1 : av > bv ? -1 : 0);
  });
  filteredResults = rows;
}

/* ═══════════════════════════════════
   TABS
═══════════════════════════════════ */
function initTabs() {
  const bar = document.getElementById('tabbar');
  bar.innerHTML = '';
  TABS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (t.id === activeTab ? ' active' : '');
    btn.textContent = t.label;
    btn.onclick = () => switchTab(t.id);
    bar.appendChild(btn);
  });
}
function switchTab(id) {
  activeTab = id;
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', TABS[i].id === id));
  renderTab();
}
function renderTab() {
  const content = document.getElementById('content');
  if (!results.length && !crawling) { content.innerHTML = welcomeHTML(); return; }
  const R = filteredResults;
  switch (activeTab) {
    case 'overview':   content.innerHTML = overviewTab(R); break;
    case 'titles':     content.innerHTML = titlesTab(R); break;
    case 'meta':       content.innerHTML = metaTab(R); break;
    case 'h1':         content.innerHTML = h1Tab(R); break;
    case 'response':   content.innerHTML = responseTab(R); break;
    case 'images':     content.innerHTML = imagesTab(R); break;
    case 'links':      content.innerHTML = linksTab(R); break;
    case 'canonical':  content.innerHTML = canonicalTab(R); break;
    case 'directives': content.innerHTML = directivesTab(R); break;
    case 'schema':     content.innerHTML = schemaTab(R); break;
    case 'security':   content.innerHTML = securityTab(R); break;
    case 'issues':     content.innerHTML = issuesTab(R); break;
  }
}

/* ═══════════════════════════════════
   HELPERS
═══════════════════════════════════ */
const tr = (s, n = 55) => (!s ? '—' : s.length > n ? s.slice(0, n) + '…' : s);
const sc = c => !c ? '#444' : c >= 200 && c < 300 ? '#22c55e' : c >= 300 && c < 400 ? '#facc15' : c >= 400 ? '#f87171' : '#666';
const lc = (n, warn, err) => !n ? '#444' : n > err ? '#f87171' : n > warn ? '#facc15' : '#22c55e';
const esc = s => (s || '').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

function iss(issues) {
  const e = issues.filter(i => i.t === 'error').length;
  const w = issues.filter(i => i.t === 'warning').length;
  if (e > 0) return `<span style="color:#f87171">⛔${e}</span>${w > 0 ? ` <span style="color:#facc15">⚠${w}</span>` : ''}`;
  if (w > 0) return `<span style="color:#facc15">⚠${w}</span>`;
  return `<span style="color:#22c55e">✔</span>`;
}

function statCards(cards, cls) {
  return `<div class="stat-grid ${cls}">
    ${cards.map(([lbl, val, color, sub]) => `
      <div class="stat-card">
        <div class="stat-val" style="color:${color}">${val ?? 0}</div>
        <div class="stat-lbl">${lbl}</div>
        ${sub ? `<div class="stat-sub">${sub}</div>` : ''}
      </div>`).join('')}
  </div>`;
}

/* ═══════════════════════════════════
   VIRTUAL TABLE ENGINE
═══════════════════════════════════ */
const ROW_H = 32;
function buildTable(id, cols, rows) {
  const totalW = cols.reduce((a, c) => a + (c.w || 120), 0);
  const headCells = cols.map(c =>
    `<div class="vtable-head-cell" style="min-width:${c.w||120}px;max-width:${c.w||120}px" onclick="handleSort('${c.key||''}',this)">
      ${c.label}${c.key && sortKey === c.key ? (sortAsc ? ' ↑' : ' ↓') : ''}
    </div>`).join('');

  const html = `<div class="vtable-wrap">
    <div class="vtable-head" style="min-width:${totalW}px">${headCells}</div>
    <div class="vtable-scroll" id="${id}-scroll">
      <div id="${id}-top"></div>
      <div id="${id}-rows"></div>
      <div id="${id}-bot"></div>
    </div>
  </div>`;

  setTimeout(() => {
    const scroller = document.getElementById(`${id}-scroll`);
    if (!scroller) return;
    const vis = Math.ceil((scroller.clientHeight || 420) / ROW_H) + 6;

    function render(scrollTop) {
      const start = Math.max(0, Math.floor(scrollTop / ROW_H) - 2);
      const end = Math.min(rows.length, start + vis);
      const top = document.getElementById(`${id}-top`);
      const bot = document.getElementById(`${id}-bot`);
      const container = document.getElementById(`${id}-rows`);
      if (!top || !bot || !container) return;
      top.style.height = (start * ROW_H) + 'px';
      bot.style.height = ((rows.length - end) * ROW_H) + 'px';
      container.innerHTML = rows.slice(start, end).map((row, i) => {
        const idx = start + i;
        const sel = selectedRow && selectedRow.url === row.url;
        const bg = sel ? '#122040' : idx % 2 === 0 ? '#0a1020' : '#080d18';
        return `<div class="vtable-row${sel ? ' selected' : ''}" style="background:${bg};height:${ROW_H}px" data-idx="${idx}">
          ${cols.map(c => {
            let v = '—';
            if (c.render) v = c.render(row);
            else if (c.key !== undefined && row[c.key] !== undefined && row[c.key] !== '') v = tr(String(row[c.key]), (c.w||120)/7);
            return `<div class="vtable-cell" style="min-width:${c.w||120}px;max-width:${c.w||120}px">${v}</div>`;
          }).join('')}
        </div>`;
      }).join('');
      container.querySelectorAll('.vtable-row').forEach(el => {
        el.addEventListener('click', () => {
          const row2 = rows[parseInt(el.dataset.idx)];
          if (row2) { selectedRow = row2; showDetail(row2); render(scroller.scrollTop); }
        });
      });
    }
    scroller.addEventListener('scroll', () => render(scroller.scrollTop), { passive: true });
    render(0);
  }, 0);
  return html;
}

function handleSort(key) {
  if (!key) return;
  if (sortKey === key) sortAsc = !sortAsc; else { sortKey = key; sortAsc = true; }
  applyFilter(); renderTab();
}

/* ═══════════════════════════════════
   TAB RENDERERS

function overviewTab(R) {
  const ok = R.filter(r => r.status_code >= 200 && r.status_code < 300).length;

  const e4 = R.filter(r => r.status_code >= 400 && r.status_code < 500).length;
  const fail = R.filter(r => r.status_code === 0).length;
  const totalErr = R.reduce((a, r) => a + r.issues.filter(i => i.t === 'error').length, 0);
  const totalWarn = R.reduce((a, r) => a + r.issues.filter(i => i.t === 'warning').length, 0);
  const avgLoad = R.length ? Math.round(R.reduce((a, r) => a + (r.ms || 0), 0) / R.length) : 0;
  const cols = [
    { label: 'URL', key: 'url', w: 260, render: r => `<a href="${esc(r.url)}" target="_blank" rel="noopener" style="color:#60a5fa;font-size:.68rem" onclick="event.stopPropagation()">${tr(r.url, 36)}</a>` },
    { label: 'Status', key: 'status_code', w: 72, render: r => `<b style="color:${sc(r.status_code)};font-family:var(--mono);font-size:.8rem">${r.status_code || '—'}</b>` },
    { label: 'Title', key: 'title', w: 200, render: r => `<span style="color:${r.title ? '#c9d1d9' : '#f87171'};font-size:.7rem">${tr(r.title, 28) || '⛔ MISSING'}</span>` },
    { label: 'T.Len', key: 'tl', w: 58, render: r => `<span style="color:${lc(r.tl,60,70)};font-family:var(--mono)">${r.tl || '—'}</span>` },
    { label: 'M.Len', key: 'dl', w: 58, render: r => `<span style="color:${lc(r.dl,155,165)};font-family:var(--mono)">${r.dl || '—'}</span>` },
    { label: 'Words', key: 'wordCount', w: 65, render: r => `<span style="color:#556070;font-family:var(--mono)">${r.wordCount}</span>` },

function issuesTab(R) {
  const allIssues = R.flatMap(r => r.issues.map(i => ({ ...i, url: r.url })));
  const errs = allIssues.filter(i => i.t === 'error').length;
  const warns = allIssues.filter(i => i.t === 'warning').length;
  const infos = allIssues.filter(i => i.t === 'info').length;
  const rows = allIssues.map((issue, idx) => {
    const clr = issue.t === 'error' ? '#f87171' : issue.t === 'warning' ? '#facc15' : '#60a5fa';
    const bg2 = issue.t === 'error' ? 'rgba(248,113,113,.07)' : issue.t === 'warning' ? 'rgba(250,204,21,.07)' : 'rgba(96,165,250,.07)';
    const icon = issue.t === 'error' ? '⛔' : issue.t === 'warning' ? '⚠️' : '💡';
    const bdg = issue.t === 'error' ? 'rgba(248,113,113,.15)' : issue.t === 'warning' ? 'rgba(250,204,21,.15)' : 'rgba(96,165,250,.15)';
    return `<div class="issue-row" style="background:${idx % 2 === 0 ? '#080d18' : '#060a14'}">
      <span style="font-size:.9rem;margin-top:1px">${icon}</span>
      <div style="flex:1;min-width:0">
        <div class="issue-msg">${issue.msg}</div>
        <div class="issue-url">${tr(issue.url, 70)}</div>
      </div>
      <span class="issue-badge" style="background:${bdg};color:${clr}">${issue.cat || issue.t}</span>
    </div>`;
  }).join('');
  return statCards([['Errors', errs, '#f87171'], ['Warnings', warns, '#facc15'], ['Opportunities', infos, '#60a5fa']], 'stat-grid-3') +
    `<div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;max-height:460px;overflow-y:auto">${rows || `<div class="vtable-empty">No issues yet</div>`}</div>`;
}

/* ═══════════════════════════════════
   CSV EXPORT
═══════════════════════════════════ */
function exportCSV() {
  const headers = ['URL','Status','Load_ms','Title','Title_Length','Meta_Description','Meta_Length','H1','H1_Count','H2_Count','H3_Count','Word_Count','Images','Missing_Alt','Internal_Links','External_Links','Has_Canonical','Canonical_URL','Meta_Robots','NoIndex','NoFollow','Has_Schema','Schema_Types','Open_Graph','Twitter_Card','HTTPS','Viewport','hreflang_Count','Page_Size_KB','Errors','Warnings'];
  const rows = results.map(r => [
    `"${r.url}"`, r.status_code, r.ms,
    `"${(r.title||'').replace(/"/g,'""')}"`, r.tl,
    `"${(r.metaDesc||'').replace(/"/g,'""')}"`, r.dl,
    `"${(r.h1||'').replace(/"/g,'""')}"`, r.h1c, r.h2c, r.h3c, r.wordCount,
    r.imgCount, r.missingAlt, r.intLinks, r.extLinks,
    r.hasCanonical?1:0, `"${r.canonical||''}"`,
    `"${r.robotsMeta||''}"`, r.noindex?1:0, r.nofollow?1:0,
    r.hasSchema?1:0, `"${r.schemaTypes.join('|')}"`,
    r.hasOG?1:0, `"${r.twitterCard||''}"`,
    r.isHttps?1:0, r.viewport?1:0, r.hreflangCount, r.pageSizeKb,
    r.issues.filter(i=>i.t==='error').length,
    r.issues.filter(i=>i.t==='warning').length,
  ].join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  let hostname = 'site';
  try { hostname = new URL(results[0].url).hostname; } catch {}
  a.href = URL.createObjectURL(blob);
  a.download = `seo-spider-${hostname}-${results.length}urls.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
